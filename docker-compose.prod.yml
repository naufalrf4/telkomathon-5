services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mydigilearn}
      POSTGRES_USER: ${POSTGRES_USER:-mydigilearn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mydigilearn} -d ${POSTGRES_DB:-mydigilearn}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

  backend:
    build:
      context: ./be-fastapi
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mydigilearn}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mydigilearn}
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "uv",
        "run",
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--proxy-headers",
        "--forwarded-allow-ips=*",
      ]
    volumes:
      - uploads_prod:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - app

  frontend:
    build:
      context: ./fe-reactnative
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app

  proxy:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${HOST_HTTP_PORT:-8080}:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app

volumes:
  pgdata_prod:
  uploads_prod:

networks:
  app:
    driver: bridge
