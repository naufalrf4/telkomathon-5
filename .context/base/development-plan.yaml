mode: refresh

phases:
  - name: prima-brand-and-auth-shell
    status: completed
    summary: Establish PRIMA runtime branding and an authenticated shell with register/login entry points and protected owner-scoped flows.
    evidence:
      - be-fastapi/app/main.py
      - be-fastapi/app/features/auth/router.py
      - fe-reactnative/app.json
      - fe-reactnative/app/login.tsx
      - fe-reactnative/app/register.tsx
  - name: syllabus-flow-reframe
    status: completed
    summary: Move the user-facing product shell to `Syllabus/Create`, `Syllabus/Generated`, revision, and export while preserving compatibility aliases to `design-session` screens.
    evidence:
      - fe-reactnative/app/syllabus/create/index.tsx
      - fe-reactnative/app/syllabus/generated.tsx
      - fe-reactnative/app/syllabus/[id]/revision.tsx
      - fe-reactnative/app/syllabus/[id]/export.tsx
  - name: backend-hardening
    status: completed
    summary: Harden ingest, legacy syllabus generation, revision persistence, and export snapshot behavior for real empty-environment audits.
    evidence:
      - be-fastapi/app/features/documents/service.py
      - be-fastapi/app/features/syllabus/generator.py
      - be-fastapi/app/features/syllabus/service.py
      - be-fastapi/app/features/export/service.py
  - name: docx-export-polish
    status: completed
    summary: Normalize the runtime DOCX template contract and clean exported text/layout issues.
    evidence:
      - be-fastapi/app/features/export/templates/syllabus_template.docx
      - be-fastapi/tests/features/test_export_service.py
  - name: production-docker-stack
    status: completed
    summary: Add a production-style Docker topology with nginx proxy, static frontend container, backend container, database, and migration/startup scripts.
    evidence:
      - docker-compose.prod.yml
      - scripts/prod-up.sh
      - fe-reactnative/Dockerfile
      - proxy/nginx.conf
  - name: post-finalize-owner-tools
    status: completed
    summary: Connect finalized syllabi to owner-scoped history, module decomposition, bulk recommendation, and career roadmap workflows.
    evidence:
      - be-fastapi/app/features/history/router.py
      - be-fastapi/app/features/personalize/router.py
      - be-fastapi/app/features/roadmap/router.py
      - fe-reactnative/app/syllabus/history.tsx
      - fe-reactnative/app/bulk/[syllabusId].tsx
      - fe-reactnative/app/roadmap/[syllabusId].tsx

major_dependencies:
  - Azure OpenAI availability and correct deployment names
  - PostgreSQL with pgvector for backend persistence
  - Consistent contract between finalized syllabus snapshots, revision apply, and DOCX template context
  - Correct production env vars in `.env.prod` / server-side secret management

known_unknowns:
  - No repo-level CI workflow is present.
  - Auth hardening beyond bearer-token ownership checks (for example RBAC, password reset, email verification, or public-facing threat controls) is not documented in the repo.
  - HTTPS/domain rollout, backup policy, and operational monitoring are still outside the repo-evident baseline.
